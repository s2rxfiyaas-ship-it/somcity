<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixi Play Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Google Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* High-quality icon rendering */
        .app-icon {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            object-fit: cover;
            border-radius: 20%;
        }

        .category-tab.active {
            color: #01875f;
            border-bottom: 3px solid #01875f;
        }

        /* Progress Bar Animation */
        #download-bar {
            transition: width 0.3s ease-in-out;
        }

        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-white text-gray-900">

    <!-- Navbar -->

            <div class="flex-1 max-w-xl">

                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input type="text" placeholder="Search apps & games" class="w-full bg-gray-100 hover:bg-white border border-transparent focus:border-gray-200 focus:bg-white rounded-full py-2.5 pl-12 pr-4 outline-none transition-all text-sm shadow-sm">
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button class="p-2 hover:bg-gray-100 rounded-full text-gray-600"><i data-lucide="help-circle" class="w-6 h-6"></i></button>
                <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm ring-2 ring-white shadow-sm">S</div>
            </div>
        </div>
        
        <!-- Category Tabs -->
        <div class="max-w-4xl mx-auto px-4 flex gap-8 overflow-x-auto no-scrollbar text-sm font-medium text-gray-500">
            <button class="category-tab active py-3 whitespace-nowrap">For you</button>
            <button class="category-tab py-3 whitespace-nowrap">Top charts</button>
            <button class="category-tab py-3 whitespace-nowrap">Events</button>
            <button class="category-tab py-3 whitespace-nowrap">Premium</button>
            <button class="category-tab py-3 whitespace-nowrap">Categories</button>
        </div>
    </nav>

    <!-- Main Feed -->
    <main class="max-w-4xl mx-auto p-4 pb-24">
        <section class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Suggested for you</h2>
                <i data-lucide="arrow-right" class="text-gray-400 w-5 h-5 cursor-pointer"></i>
            </div>
            
            <div id="app-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-y-8 gap-x-4">
                <!-- Apps will load here -->
            </div>
        </section>
    </main>

    <!-- App Details Modal -->
    <div id="app-modal" class="fixed inset-0 z-[100] bg-white hidden overflow-y-auto">
        <div class="sticky top-0 bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100">
            <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left"></i></button>
            <div class="flex gap-2">
                <button class="p-2"><i data-lucide="search" class="w-5 h-5 text-gray-600"></i></button>
                <button class="p-2"><i data-lucide="more-vertical" class="w-5 h-5 text-gray-600"></i></button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto p-6">
            <div class="flex gap-6 mb-8">

                <div class="flex-1">
                    <h1 id="m-title" class="text-2xl font-bold text-gray-900 leading-tight"></h1>
                    <p id="m-dev" class="text-green-700 font-medium text-sm mb-4"></p>
                    
                    <div id="dl-container" class="hidden mb-4">
                        <div class="flex justify-between text-xs font-bold text-gray-500 mb-1">
                            <span id="dl-status">Pending...</span>
                            <span id="dl-percent">0%</span>
                        </div>
                        <div class="w-full h-1 bg-gray-100 rounded-full overflow-hidden">
                            <div id="download-bar" class="h-full bg-green-700 w-0"></div>
                        </div>
                    </div>

                    <button id="install-btn" onclick="startInstall()" class="w-full bg-green-700 text-white font-bold py-2.5 rounded-lg hover:bg-green-800 transition-colors shadow-sm">
                        Install
                    </button>
                </div>
            </div>

            <div class="flex justify-around border-y border-gray-100 py-4 mb-8 text-center">
                <div>
                    <p class="font-bold text-sm" id="m-rating">5.0 ★</p>

                </div>
                <div class="w-px h-8 bg-gray-100"></div>
                <div>
                    <p class="font-bold text-sm" id="m-size">180 MB</p>

                </div>
                <div class="w-px h-8 bg-gray-100"></div>
                <div>

            </div>

            <div id="screenshots-section" class="mb-8 overflow-x-auto flex gap-4 no-scrollbar pb-2">

            <div class="mb-8">

            </div>

            <!-- Ratings & Reviews Section -->
            <div class="border-t border-gray-100 pt-6">

                    <i data-lucide="arrow-right" class="text-gray-400 w-5 h-5"></i>
                </div>

            </div>

        function renderApps() {
            const list = document.getElementById('app-list');
            list.innerHTML = apps.map(app => `
                <div class="cursor-pointer group" onclick="openModal(${app.id})">
                    <div class="relative mb-2">
                        <img src="${app.icon}" alt="${app.title}" class="w-full aspect-square app-icon bg-gray-50 border border-gray-100 shadow-sm group-active:scale-95 transition-transform">
                    </div>
                    <h3 class="text-[13px] font-medium leading-tight truncate">${app.title}</h3>
                    <p class="text-[11px] text-gray-500 mt-0.5">${app.size}</p>
                    <div class="flex items-center gap-1 mt-0.5">
                        <span class="text-[11px] font-medium text-gray-600">${app.rating}★</span>
                    </div>
                </div>
            `).join('');
        }

        let currentApp = null;

        function openModal(id) {
            currentApp = apps.find(a => a.id === id);
            document.getElementById('m-title').innerText = currentApp.title;
            document.getElementById('m-dev').innerText = currentApp.dev;
            document.getElementById('m-icon').src = currentApp.icon;
            document.getElementById('m-rating').innerText = currentApp.rating + ' ★';
            document.getElementById('m-size').innerText = currentApp.size;
            document.getElementById('m-desc').innerText = currentApp.desc;
            
            // Screenshots - Set to landscape ratio (16:9 approx)
            const ssList = document.getElementById('screenshots-section');
            if (currentApp.screenshots && currentApp.screenshots.length > 0) {
                ssList.innerHTML = currentApp.screenshots.map(url => `
                    <img src="${url}" class="h-40 sm:h-52 rounded-xl border border-gray-100 shadow-sm object-cover aspect-video min-w-[280px] sm:min-w-[360px]">
                `).join('');
                ssList.classList.remove('hidden');
            } else {
                ssList.innerHTML = `
                    <div class="min-w-[280px] h-[160px] bg-gray-100 rounded-xl shimmer"></div>
                    <div class="min-w-[280px] h-[160px] bg-gray-100 rounded-xl shimmer"></div>
                `;
            }

            // Reviews
            const reviewsList = document.getElementById('reviews-list');
            if (currentApp.reviews && currentApp.reviews.length > 0) {
                reviewsList.innerHTML = currentApp.reviews.map(rev => `
                    <div class="space-y-2">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold text-xs">${rev.name.charAt(0)}</div>
                            <span class="text-sm font-medium">${rev.name}</span>
                        </div>
                        <div class="flex items-center gap-2 text-[10px] text-gray-500">
                            <div class="flex text-green-700">
                                ${Array(rev.stars).fill('<i data-lucide="star" class="w-3 h-3 fill-current"></i>').join('')}
                                ${Array(5 - rev.stars).fill('<i data-lucide="star" class="w-3 h-3"></i>').join('')}
                            </div>
                            <span>${rev.date}</span>
                        </div>
                        <p class="text-xs text-gray-600 leading-relaxed">${rev.comment}</p>
                    </div>
                `).join('');
            } else {
                reviewsList.innerHTML = '<p class="text-sm text-gray-400">No reviews yet.</p>';
            }
            
            document.getElementById('dl-container').classList.add('hidden');
            document.getElementById('install-btn').classList.remove('hidden');
            document.getElementById('install-btn').innerText = 'Install';
            document.getElementById('download-bar').style.width = '0%';
            
            document.getElementById('app-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('app-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function startInstall() {
            const btn = document.getElementById('install-btn');
            const container = document.getElementById('dl-container');
            const bar = document.getElementById('download-bar');
            const percent = document.getElementById('dl-percent');
            const status = document.getElementById('dl-status');

            btn.classList.add('hidden');
            container.classList.remove('hidden');

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    status.innerText = 'Installing...';
                    setTimeout(() => {
                        status.innerText = 'Installed';
                        percent.innerText = '';
                        container.innerHTML = `<button onclick="triggerDownload()" class="w-full bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-md active:scale-95 transition-all">Open / Download APK</button>`;
                    }, 1000);
                }
                bar.style.width = progress + '%';
                percent.innerText = progress + '%';
            }, 300);
        }

        function triggerDownload() {
            if (currentApp && currentApp.downloadUrl) {
                window.location.href = currentApp.downloadUrl;
            } else {
                alert("This is a demo. Download only available for Somcity Mobile.");
            }
        }

        window.onload = () => {
            renderApps();
            lucide.createIcons();
        };
    </script>
